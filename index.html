<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quota Manager</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app">


    <div class="control-panel">
      <div class="control-group">
        <label>Total Global Quota</label>
        <input type="number" id="ctrl-total" min="1" value="50">
      </div>
      <div class="control-group">
        <label>Max Per Container</label>
        <input type="number" id="ctrl-max" min="1" value="10">
      </div>
      <div class="control-actions">
         <input type="text" id="ctrl-new-id" placeholder="New Container Name" />
         <button id="btn-add-container" class="btn-primary">+ Add Container</button>
      </div>
    </div>


    <div class="eq-section">
      <div class="eq-header">
        <div class="eq-title">Max Available For Active Container</div>
        <div class="eq-dots">...</div>
      </div>

      <div class="eq-row">
        <span class="eq-label">constraint 1</span>
        <span class="pill pill-blue" id="eq-c1-max">10</span>
        <span class="eq-op">−</span>
        <span class="pill pill-blue">current_items</span>
        <span class="eq-op">=</span>
        <span class="pill pill-blue" id="eq-c1-result">8</span>
      </div>

      <div class="eq-row">
        <span class="eq-label">constraint 2</span>
        <span class="pill pill-amber" id="eq-c2-total">50</span>
        <span class="eq-op">−</span>
        <span class="pill pill-amber">allocated_items</span>
        <span class="eq-op">=</span>
        <span class="pill pill-amber" id="eq-c2-result">3</span>
      </div>

      <hr class="eq-divider" />

      <div class="eq-row">
        <span class="eq-label">result</span>
        <span style="color:var(--muted);">min(</span>
        <span class="pill pill-blue" id="eq-r1">8</span>
        <span class="eq-op">,</span>
        <span class="pill pill-amber" id="eq-r2">3</span>
        <span style="color:var(--muted);">)</span>
        <span class="eq-op">=</span>
        <span class="pill pill-result" id="eq-answer">3</span>
      </div>


    </div>


    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Total Quota</div>
        <div class="metric-value" id="m-total">50</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Snapshot Allocated</div>
        <div class="metric-value" id="m-snapshot">22</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Session Delta (Edit)</div>
        <div class="metric-value" id="m-delta">+0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Remaining Quota</div>
        <div class="metric-value" id="m-remaining">28</div>
      </div>
    </div>
    

    <div class="submit-actions">
       <button id="btn-submit" class="btn-success">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
         Submit Changes
       </button>
    </div>


    <div id="containers-row"></div>

  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
